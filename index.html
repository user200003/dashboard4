        /* 总目标卡片 */
        .overview-card { background: linear-gradient(135deg, #1a2f4e, #1e3a5f); border-radius: 28px; padding: 20px 20px; margin-bottom: 24px; color: white; }

        .completion-text { font-size: 20px; font-weight: 800; color: #ffd966; }
        .small-note { font-size: 10px; opacity: 0.7; }

        /* 独立项目块 */
        .project-block { margin-bottom: 32px; }
        .project-block .card { margin-bottom: 0; }

        /* 卡片样式 */
        .card { background: white; border-radius: 24px; border: 1px solid #eef2f9; overflow: hidden; margin-bottom: 0; }
        .card-header { padding: 16px 20px 10px; border-bottom: 1px solid #eef2f8; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .project-name { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
        .project-name i { font-size: 20px; color: #2A5298; }
        .badge-count { background: #f0f4fe; border-radius: 40px; padding: 4px 10px; font-size: 12px; font-weight: 600; color: #2A5298; }
        .stats-body { padding: 16px 20px 20px; }
        .stat-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #eef3fc; }
        .stat-label { font-size: 13px; color: #5e748e; font-weight: 500; }
        .stat-number { font-size: 18px; font-weight: 700; color: #1f3a5f; }
        .refund-approved { display: flex; justify-content: space-between; margin-top: 12px; }
        .refund { color: #c2410c; font-weight: 600; font-size: 13px; }
        .approved { color: #15803d; font-weight: 600; font-size: 13px; }

        /* 子类明细卡片形式 - 移动端优化 */
        .sub-detail { background: #f9fbfe; border-radius: 20px; padding: 12px 14px; margin-top: 12px; border: 1px solid #eef2f9; }
        .sub-title { font-size: 13px; font-weight: 600; color: #2c3f5c; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
        .sub-card-grid { display: flex; flex-wrap: wrap; gap: 10px; }
        .sub-item-card { background: white; border-radius: 14px; padding: 8px 10px; flex: 1 1 auto; min-width: 100px; border: 1px solid #eef2f9; }
        .sub-item-name { font-size: 12px; font-weight: 600; color: #2A5298; margin-bottom: 5px; }
        .sub-item-stats { display: flex; justify-content: space-between; font-size: 10px; color: #1f3a5f; margin-top: 4px; }
        .sub-item-stats span:first-child { font-weight: 500; color: #5e748e; }
        .sub-item-stats span:last-child { font-weight: 700; }

        /* 其他项目网格 */
        .kpi-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 32px; }

        /* 全局表格（移动端可横向滚动） */
        .table-wrapper { overflow-x: auto; background: white; border-radius: 20px; border: 1px solid #eef2fa; margin-top: 16px; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 700px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #f0f5fc; white-space: nowrap; }
        th { background: #fafcff; font-weight: 600; }
        .footer { text-align: center; margin-top: 24px; font-size: 11px; color: #7c8ba0; border-top: 1px solid #e2e8f0; padding-top: 16px; }

        @media (max-width: 480px) {
            body { padding: 12px 8px; }
            .overview-card { padding: 16px; }
            .overview-number { font-size: 20px; }
            .completion-text { font-size: 18px; }

            .sub-item-name { font-size: 11px; }
            .sub-item-stats { font-size: 9px; }
        }
    </style>
</head>

    function evaluateFormula(val) {
        if (val === undefined || val === null) return 0;
        if (typeof val !== 'string') return val;
        let str = val.trim();
        if (str.startsWith('=')) {
            str = str.substring(1);
            try {
                let parts = str.split('+');
                let sum = 0;
                for (let p of parts) {
                    let num = parseFloat(p);
                    if (isNaN(num)) return val;
                    sum += num;
                }
                return sum;
            } catch(e) { return val; }
        }
        return parseFloat(val);
    }

    // 收集子类明细：只统计新签合同（当年新签且合同金额>0）
    // 返回每个子类的签约单数和这些新签合同对应的回款金额（不含往年合同回款）
    function collectSubItemsNewSign(projectType, excludeMainService = null) {
        const subMap = new Map();
        for (let row of rawRows) {
            let [proj, service, contractRaw, receivedRaw, status, isOld, contractNo, receivedDate, refundRaw] = row;
            if (proj !== projectType) continue;
            if (excludeMainService && service === excludeMainService) continue;
            let contractAmt = evaluateFormula(contractRaw);
            let received = evaluateFormula(receivedRaw);
            if (isNaN(contractAmt)) contractAmt = 0;
            if (isNaN(received)) received = 0;
            const isTail = (isOld === "是");
            // 仅当年新签且合同金额>0
            if (!isTail && contractAmt > 0) {
                if (!subMap.has(service)) {
                    subMap.set(service, { service, signCount: 0, receivedAmount: 0 });
                }
                let sub = subMap.get(service);
                sub.signCount += 1;
                sub.receivedAmount += received;   // 累加该新签合同的回款金额
            }
        }
        return Array.from(subMap.values()).filter(s => s.signCount > 0);
    }

    const overseasSubs = collectSubItemsNewSign("海外移民项目");
    const hkInvestmentSubs = collectSubItemsNewSign("香港投资移民", "投资移民");

    // 聚合主项目数据
    const projectStats = new Map();
    for (let row of rawRows) {
        let [proj, service, contractRaw, receivedRaw, status, isOld, contractNo, receivedDate, refundRaw] = row;
        let contractAmt = evaluateFormula(contractRaw);
        if (isNaN(contractAmt)) contractAmt = 0;
        let received = evaluateFormula(receivedRaw);
        if (isNaN(received)) received = 0;
        let refund = evaluateFormula(refundRaw);
        if (isNaN(refund)) refund = 0;

        let displayType = proj;
        if (proj === "海外移民项目" || proj === "香港投资移民") displayType = proj;

        if (!projectStats.has(displayType)) {
            projectStats.set(displayType, {
                newSignCount: 0,
                newContractSum: 0,
                totalReceived: 0,
                tailReceived: 0,
                refundAmount: 0,
                refundCount: 0,
                approvedCount: 0
            });
        }
        const stat = projectStats.get(displayType);
        stat.totalReceived += received;
        stat.refundAmount += refund;
        const isTail = (isOld === "是");
        if (isTail) {
            stat.tailReceived += received;
        } else {
            if (contractAmt > 0) {
                if (proj === "香港投资移民" && service !== "投资移民") {
                    stat.newContractSum += contractAmt;
                } else {
                    stat.newSignCount += 1;
                    stat.newContractSum += contractAmt;
                }
            }
        }
        if (status === "已退款") stat.refundCount += 1;
        if (status === "已获批") {
            if (proj === "香港投资移民" && service !== "投资移民") {
                // 子类不影响主项目获批数
            } else {
                stat.approvedCount += 1;
            }
        }
    }

    // 总回款 & 进度
    let grandTotal = 0;
    const allTypes = Array.from(projectStats.keys()).sort();
    const displayData = [];
    for (let type of allTypes) {
        const s = projectStats.get(type);
        grandTotal += s.totalReceived;
        displayData.push({
            type,
            newSignCount: s.newSignCount,
            newContractAmount: s.newContractSum,
            totalReceived: s.totalReceived,
            tailReceived: s.tailReceived,
            refundAmount: s.refundAmount,
            refundCount: s.refundCount,
            approvedCount: s.approvedCount
        });
    }
    const TARGET = 25000000;
    const percent = (grandTotal / TARGET) * 100;
    document.getElementById('totalReceivedDisplay').innerHTML = `¥ ${grandTotal.toLocaleString()}`;
    document.getElementById('progressFill').style.width = `${Math.min(percent, 100)}%`;
    document.getElementById('completionRate').innerHTML = `${percent.toFixed(2)}%`;

    function renderCard(item) {
        return `
            <div class="card">
                <div class="card-header">
                    <div class="project-name"><i class="fas fa-folder-open"></i> ${item.type}</div>
                    <div class="badge-count">新签 ${item.newSignCount} 单</div>
                </div>
                <div class="stats-body">
                    <div class="stat-row"><span class="stat-label">当年签约金额</span><span class="stat-number">¥ ${item.newContractAmount.toLocaleString()}</span></div>
                    <div class="stat-row"><span class="stat-label">总回款金额</span><span class="stat-number">¥ ${item.totalReceived.toLocaleString()}</span></div>
                    <div class="stat-row"><span class="stat-label">往年合同回款</span><span class="stat-number">¥ ${item.tailReceived.toLocaleString()}</span></div>
                    <div class="stat-row"><span class="stat-label">退款金额</span><span class="stat-number">¥ ${item.refundAmount.toLocaleString()}</span></div>
                    <div class="refund-approved">
                        <span class="refund">退单 ${item.refundCount}</span>
                        <span class="approved">获批 ${item.approvedCount}</span>
                    </div>
                </div>
            </div>
        `;
    }

    function renderSubDetailNewSign(subData, title) {
        if (!subData || subData.length === 0) return '';
        return `
            <div class="sub-detail">
                <div class="sub-title"><i class="fas fa-th-large"></i> ${title}</div>
                <div class="sub-card-grid">
                    ${subData.map(sub => `
                        <div class="sub-item-card">
                            <div class="sub-item-name">${sub.service}</div>
                            <div class="sub-item-stats">
                                <span>新签单数</span>
                                <span>${sub.signCount}</span>
                            </div>
                            <div class="sub-item-stats">
                                <span>回款金额</span>
                                <span>¥ ${sub.receivedAmount.toLocaleString()}</span>
                            </div>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    }

    // 海外移民块
    const overseasItem = displayData.find(d => d.type === "海外移民项目");
    if (overseasItem) {
        document.getElementById('overseasBlock').innerHTML = `
            ${renderCard(overseasItem)}
            ${renderSubDetailNewSign(overseasSubs, "海外移民子类明细（新签单数 & 回款）")}
        `;
    }

    // 香港投资移民块
    const hkInvestmentItem = displayData.find(d => d.type === "香港投资移民");
    if (hkInvestmentItem) {
        document.getElementById('hkInvestmentBlock').innerHTML = `
            ${renderCard(hkInvestmentItem)}
            ${renderSubDetailNewSign(hkInvestmentSubs, "香港投资移民子类明细（新签单数 & 回款）")}
        `;
    }

    // 其他项目网格
    const otherItems = displayData.filter(d => d.type !== "海外移民项目" && d.type !== "香港投资移民");
    const cardsContainer = document.getElementById('cardsContainer');
    cardsContainer.innerHTML = otherItems.map(item => renderCard(item)).join('');

    // 明细表
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = displayData.map(item => `
        <tr>
            <td><strong>${item.type}</strong></td>
            <td>${item.newSignCount}</td>
            <td class="stat-number">¥ ${item.newContractAmount.toLocaleString()}</td>
            <td class="stat-number">¥ ${item.totalReceived.toLocaleString()}</td>
            <td class="stat-number">¥ ${item.tailReceived.toLocaleString()}</td>
            <td class="stat-number">¥ ${item.refundAmount.toLocaleString()}</td>
            <td>${item.refundCount}</td>
            <td>${item.approvedCount}</td>
        </tr>
    `).join('');
